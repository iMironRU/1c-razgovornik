# ─────────────────────────────────────────────
# ИДЕНТИФИКАЦИЯ КНИГИ
# ─────────────────────────────────────────────
title: "1С как иностранный язык"
subtitle: "Для тех, кто уже умеет программировать"
author: "Александр Мирошниченко"
author_url: "https://github.com/iMironRU"
language: ru
license: "CC BY 4.0"

version: "0.2.0"

# ─────────────────────────────────────────────
# ОТСЛЕЖИВАНИЕ ШАБЛОНА
# ─────────────────────────────────────────────
template_repo: "https://github.com/iMironRU/book-template"
template_version: "v0.1.0"

# ─────────────────────────────────────────────
# ФОРМАТЫ ВЫПУСКА
# ─────────────────────────────────────────────
formats:
  epub:     true
  fb2:      true
  pdf_a5:   true
  pdf_a4:   false
  html:     true
  docx:     true
  docx_a4:  false
  site:     true

release_filter: "review"
nightly_filter: "all"

# ─────────────────────────────────────────────
# ДОПОЛНИТЕЛЬНЫЕ АРТЕФАКТЫ
# ─────────────────────────────────────────────
artifacts: []

# ─────────────────────────────────────────────
# САЙТ (GitHub Pages)
# ─────────────────────────────────────────────
site_url: "https://iMironRU.github.io/1c-inostrannyy-yazyk"

# ─────────────────────────────────────────────
# НОЧНЫЕ СБОРКИ
# ─────────────────────────────────────────────
nightly:
  enabled: true
  branch: "main"

# ─────────────────────────────────────────────
# PDF — ПАРАМЕТРЫ СТРАНИЦЫ
# ─────────────────────────────────────────────
pdf:
  font_main: "PT Serif"
  font_mono: "JetBrains Mono"
  font_size: "11pt"
  margin_a5: "top=20mm,right=15mm,bottom=20mm,left=20mm"
  margin_a4: "top=25mm,right=20mm,bottom=25mm,left=25mm"
